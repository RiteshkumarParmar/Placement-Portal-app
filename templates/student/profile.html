{% extends "base.html" %}
{% block title %}My Profile - PlaceHub{% endblock %}

{% block content %}
<h2 class="mb-4"><i class="bi bi-person me-2"></i>My Profile</h2>

<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
                <form method="POST" action="{{ url_for('student.profile') }}" enctype="multipart/form-data">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="name" class="form-label">Full Name *</label>
                            <input type="text" class="form-control" id="name" name="name"
                                   value="{{ student.name }}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Roll Number</label>
                            <input type="text" class="form-control" value="{{ student.roll_number }}" disabled>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" value="{{ current_user.email }}" disabled>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="phone" class="form-label">Phone</label>
                            <input type="tel" class="form-control" id="phone" name="phone"
                                   value="{{ student.phone or '' }}">
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label for="department" class="form-label">Department</label>
                            <select class="form-select" id="department" name="department">
                                <option value="">Select...</option>
                                {% for dept in ['Computer Science', 'Information Technology', 'Electronics', 'Electrical', 'Mechanical', 'Civil', 'Chemical', 'Other'] %}
                                <option value="{{ dept }}" {{ 'selected' if student.department == dept }}>{{ dept }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="cgpa" class="form-label">CGPA</label>
                            <input type="number" step="0.01" min="0" max="10" class="form-control" id="cgpa" name="cgpa"
                                   value="{{ student.cgpa or '' }}">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="graduation_year" class="form-label">Graduation Year</label>
                            <input type="number" min="2020" max="2035" class="form-control" id="graduation_year" name="graduation_year"
                                   value="{{ student.graduation_year or '' }}">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="skills" class="form-label">Skills</label>
                        <input type="text" class="form-control" id="skills" name="skills"
                               value="{{ student.skills or '' }}" placeholder="e.g., Python, Java, SQL, Machine Learning">
                    </div>
                    <div class="mb-3">
                        <label for="about" class="form-label">About Me</label>
                        <textarea class="form-control" id="about" name="about" rows="3">{{ student.about or '' }}</textarea>
                    </div>
                    <div class="mb-3">
                        <label for="resume" class="form-label">Resume (PDF, DOC, DOCX)</label>
                        <input type="file" class="form-control" id="resume" name="resume" accept=".pdf,.doc,.docx">
                        {% if student.resume_path %}
                        <small class="text-success"><i class="bi bi-check-circle me-1"></i>Current file: {{ student.resume_path }}</small>
                        {% endif %}
                    </div>
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-lg me-1"></i>Save Profile
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
