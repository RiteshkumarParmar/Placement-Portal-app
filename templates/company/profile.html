{% extends "base.html" %}
{% block title %}Company Profile - PlaceHub{% endblock %}

{% block content %}
<h2 class="mb-4"><i class="bi bi-gear me-2"></i>Company Profile</h2>

<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
                <form method="POST" action="{{ url_for('company.profile') }}">
                    <div class="mb-3">
                        <label for="company_name" class="form-label">Company Name *</label>
                        <input type="text" class="form-control" id="company_name" name="company_name"
                               value="{{ company.company_name }}" required>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="hr_name" class="form-label">HR Contact Name</label>
                            <input type="text" class="form-control" id="hr_name" name="hr_name"
                                   value="{{ company.hr_name or '' }}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="hr_email" class="form-label">HR Email</label>
                            <input type="email" class="form-control" id="hr_email" name="hr_email"
                                   value="{{ company.hr_email or '' }}">
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label for="hr_phone" class="form-label">HR Phone</label>
                            <input type="tel" class="form-control" id="hr_phone" name="hr_phone"
                                   value="{{ company.hr_phone or '' }}">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="industry" class="form-label">Industry</label>
                            <select class="form-select" id="industry" name="industry">
                                <option value="">Select...</option>
                                {% for ind in ['IT/Software', 'Finance', 'Consulting', 'Manufacturing', 'Healthcare', 'E-Commerce', 'Education', 'Other'] %}
                                <option value="{{ ind }}" {{ 'selected' if company.industry == ind }}>{{ ind }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="website" class="form-label">Website</label>
                            <input type="url" class="form-control" id="website" name="website"
                                   value="{{ company.website or '' }}">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="description" class="form-label">Company Description</label>
                        <textarea class="form-control" id="description" name="description" rows="4">{{ company.description or '' }}</textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-lg me-1"></i>Save Changes
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
