{% extends "base.html" %}
{% block title %}Create Placement Drive - PlaceHub{% endblock %}

{% block content %}
<h2 class="mb-4"><i class="bi bi-plus-circle me-2"></i>Create Placement Drive</h2>

<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
                <div class="alert alert-info">
                    <i class="bi bi-info-circle me-1"></i>
                    Your drive will be visible to students after admin approval.
                </div>
                <form method="POST" action="{{ url_for('company.create_drive') }}">
                    <div class="mb-3">
                        <label for="job_title" class="form-label">Job Title *</label>
                        <input type="text" class="form-control" id="job_title" name="job_title" required
                               placeholder="e.g., Software Engineer, Data Analyst">
                    </div>
                    <div class="mb-3">
                        <label for="job_description" class="form-label">Job Description *</label>
                        <textarea class="form-control" id="job_description" name="job_description" rows="4" required
                                  placeholder="Describe the role, responsibilities, etc."></textarea>
                    </div>
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label for="job_type" class="form-label">Job Type</label>
                            <select class="form-select" id="job_type" name="job_type">
                                <option value="">Select...</option>
                                <option value="Full-time">Full-time</option>
                                <option value="Internship">Internship</option>
                                <option value="Part-time">Part-time</option>
                                <option value="Contract">Contract</option>
                            </select>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="location" class="form-label">Location</label>
                            <input type="text" class="form-control" id="location" name="location"
                                   placeholder="e.g., Bangalore, Remote">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="salary_package" class="form-label">Salary Package</label>
                            <input type="text" class="form-control" id="salary_package" name="salary_package"
                                   placeholder="e.g., 8-12 LPA">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="eligibility_criteria" class="form-label">Eligibility Criteria</label>
                        <textarea class="form-control" id="eligibility_criteria" name="eligibility_criteria" rows="2"
                                  placeholder="e.g., No backlogs, B.Tech CS/IT only"></textarea>
                    </div>
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label for="min_cgpa" class="form-label">Minimum CGPA</label>
                            <input type="number" step="0.01" min="0" max="10" class="form-control" id="min_cgpa" name="min_cgpa"
                                   placeholder="e.g., 7.0">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="departments_allowed" class="form-label">Departments Allowed</label>
                            <input type="text" class="form-control" id="departments_allowed" name="departments_allowed"
                                   placeholder="e.g., CS, IT, ECE">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="application_deadline" class="form-label">Application Deadline *</label>
                            <input type="date" class="form-control" id="application_deadline" name="application_deadline" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-lg me-1"></i>Create Drive
                    </button>
                    <a href="{{ url_for('company.my_drives') }}" class="btn btn-outline-secondary ms-2">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
