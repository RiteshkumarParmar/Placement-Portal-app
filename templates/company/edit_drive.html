{% extends "base.html" %}
{% block title %}Edit Drive - PlaceHub{% endblock %}

{% block content %}
<h2 class="mb-4"><i class="bi bi-pencil me-2"></i>Edit Placement Drive</h2>

<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
                <form method="POST" action="{{ url_for('company.edit_drive', drive_id=drive.id) }}">
                    <div class="mb-3">
                        <label for="job_title" class="form-label">Job Title *</label>
                        <input type="text" class="form-control" id="job_title" name="job_title"
                               value="{{ drive.job_title }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="job_description" class="form-label">Job Description *</label>
                        <textarea class="form-control" id="job_description" name="job_description" rows="4" required>{{ drive.job_description }}</textarea>
                    </div>
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label for="job_type" class="form-label">Job Type</label>
                            <select class="form-select" id="job_type" name="job_type">
                                <option value="">Select...</option>
                                {% for jt in ['Full-time', 'Internship', 'Part-time', 'Contract'] %}
                                <option value="{{ jt }}" {{ 'selected' if drive.job_type == jt }}>{{ jt }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="location" class="form-label">Location</label>
                            <input type="text" class="form-control" id="location" name="location"
                                   value="{{ drive.location or '' }}">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="salary_package" class="form-label">Salary Package</label>
                            <input type="text" class="form-control" id="salary_package" name="salary_package"
                                   value="{{ drive.salary_package or '' }}">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="eligibility_criteria" class="form-label">Eligibility Criteria</label>
                        <textarea class="form-control" id="eligibility_criteria" name="eligibility_criteria" rows="2">{{ drive.eligibility_criteria or '' }}</textarea>
                    </div>
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label for="min_cgpa" class="form-label">Minimum CGPA</label>
                            <input type="number" step="0.01" min="0" max="10" class="form-control" id="min_cgpa" name="min_cgpa"
                                   value="{{ drive.min_cgpa or '' }}">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="departments_allowed" class="form-label">Departments Allowed</label>
                            <input type="text" class="form-control" id="departments_allowed" name="departments_allowed"
                                   value="{{ drive.departments_allowed or '' }}">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="application_deadline" class="form-label">Application Deadline *</label>
                            <input type="date" class="form-control" id="application_deadline" name="application_deadline"
                                   value="{{ drive.application_deadline.strftime('%Y-%m-%d') }}" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-lg me-1"></i>Update Drive
                    </button>
                    <a href="{{ url_for('company.my_drives') }}" class="btn btn-outline-secondary ms-2">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
