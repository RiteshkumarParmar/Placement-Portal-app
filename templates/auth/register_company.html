{% extends "base.html" %}
{% block title %}Company Registration - PlaceHub{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <h3 class="text-center mb-4"><i class="bi bi-building-add me-2"></i>Company Registration</h3>
                <div class="alert alert-info">
                    <i class="bi bi-info-circle me-1"></i>
                    After registration, your account will need admin approval before you can log in.
                </div>
                <form method="POST" action="{{ url_for('register_company') }}">
                    <div class="mb-3">
                        <label for="company_name" class="form-label">Company Name *</label>
                        <input type="text" class="form-control" id="company_name" name="company_name" required>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Login Email *</label>
                        <input type="email" class="form-control" id="email" name="email" required>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="password" class="form-label">Password *</label>
                            <input type="password" class="form-control" id="password" name="password" required minlength="6">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="confirm_password" class="form-label">Confirm Password *</label>
                            <input type="password" class="form-control" id="confirm_password" name="confirm_password" required minlength="6">
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="hr_name" class="form-label">HR Contact Name</label>
                            <input type="text" class="form-control" id="hr_name" name="hr_name">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="hr_email" class="form-label">HR Email</label>
                            <input type="email" class="form-control" id="hr_email" name="hr_email">
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label for="hr_phone" class="form-label">HR Phone</label>
                            <input type="tel" class="form-control" id="hr_phone" name="hr_phone">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="industry" class="form-label">Industry</label>
                            <select class="form-select" id="industry" name="industry">
                                <option value="">Select...</option>
                                <option value="IT/Software">IT/Software</option>
                                <option value="Finance">Finance</option>
                                <option value="Consulting">Consulting</option>
                                <option value="Manufacturing">Manufacturing</option>
                                <option value="Healthcare">Healthcare</option>
                                <option value="E-Commerce">E-Commerce</option>
                                <option value="Education">Education</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="website" class="form-label">Website</label>
                            <input type="url" class="form-control" id="website" name="website" placeholder="https://...">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="description" class="form-label">Company Description</label>
                        <textarea class="form-control" id="description" name="description" rows="3"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 mb-3">Submit Registration</button>
                </form>
                <p class="text-center text-muted mb-0">
                    Already registered? <a href="{{ url_for('login') }}">Login here</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
