{% extends "base.html" %}
{% block title %}Login - PlaceHub{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <h3 class="text-center mb-4"><i class="bi bi-box-arrow-in-right me-2"></i>Login</h3>
                <form method="POST" action="{{ url_for('login') }}">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email Address</label>
                        <input type="email" class="form-control" id="email" name="email" required placeholder="you@example.com">
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" name="password" required placeholder="Enter your password">
                    </div>
                    <button type="submit" class="btn btn-primary w-100 mb-3">Login</button>
                </form>
                <hr>
                <p class="text-center text-muted mb-0">
                    Don't have an account?
                    <a href="{{ url_for('register_student') }}">Register as Student</a> or
                    <a href="{{ url_for('register_company') }}">Register as Company</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
